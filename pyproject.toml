[tool.ruff]
target-version = "py311"
line-length = 100
src = ["backend"]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "ASYNC", # flake8-async — blocking I/O calls in async functions
    "S",     # flake8-bandit (security)
]
ignore = [
    "E501",  # line length — handled by formatter
    "S101",  # assert — covered per-file below
    "S104",  # binding to 0.0.0.0 — intentional in FastAPI dev
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/**" = ["S101", "S106"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.bandit]
targets = ["backend/app"]
skips = ["B101"]
recursive = true
