version = 1

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  # Stops DeepSource's parser emitting JS-0833 "import/export only with
  # sourceType: module" false-positives on our ES modules (#223 1.3).
  #
  # This block previously used `module_system = "esm"`, `dialect = "jsx"` and
  # environments "es2022"/"node" — none of which are values the analyzer
  # accepts, so the intended fix never took effect and JS-0833 kept firing.
  # That is also why the per-file `skipcq: JS-0833` markers are useless against
  # it: a file that fails to PARSE never gets far enough for inline
  # suppressions to be honoured.
  #
  # Valid values (per DeepSource's JavaScript analyzer docs):
  #   environment   browser | nodejs | jest | mocha | jasmine | jquery | mongo
  #                 | cypress | vitest
  #   module_system commonjs | es-modules | amd
  #   dialect       typescript | flow      (omitted — the default handles JS/JSX)
  #   plugins       react | vue | ember | meteor | angular | angularjs
  environment = ["browser", "nodejs", "vitest"]
  module_system = "es-modules"

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  runtime_version = "3.x.x"
